<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEPTIC PATH | Protocol Zero</title>
    <style>
        /* Estilos Base - Estética 1-Bit */
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Efecto de Scanlines (Capa Superior) */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .container {
            max-width: 800px;
            text-align: center;
            padding: 20px;
            z-index: 5;
        }

        /* Título con estilo 8-bit */
        h1 {
            font-size: 3rem;
            letter-spacing: 5px;
            border-bottom: 4px solid #fff;
            display: inline-block;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 40px;
            display: block;
        }

        /* Espacio para el GIF o Imagen del Personaje */
        .character-preview {
            width: 200px;
            height: 200px;
            border: 2px dashed #444;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }

        p {
            line-height: 1.6;
            font-size: 1.1rem;
            color: #ccc;
            text-align: justify;
        }

        .dev-log {
            margin-top: 50px;
            border-top: 1px solid #333;
            padding-top: 20px;
            text-align: left;
        }

        .log-entry {
            background: #111;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #fff;
        }

        .log-date {
            font-weight: bold;
            color: #555;
            font-size: 0.9rem;
        }

        /* Botón de Acción */
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            border: 2px solid #fff;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #fff;
            color: #000;
        }

        /* Animación de Parpadeo */
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
        .cursor { animation: blink 1s infinite; }
    </style>
</head>
<body>

    <div class="container">
        <h1>SEPTIC PATH</h1>
        <span class="subtitle">PROTOCOL ZERO <span class="cursor">_</span></span>

        <div class="character-preview">
